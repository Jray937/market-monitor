# ─────────────────────────────────────────────
# Market Monitor 設定檔
# ⚠️ Token 請在 Railway 環境變數設定，不要寫在這裡
# ─────────────────────────────────────────────

monitor:
  interval_minutes: 15
  summary_interval: 60

symbols:
  stocks:
    - symbol: "NVDA"
      alerts:
        - type: "rsi_oversold"
          threshold: 30
          cooldown_hours: 6
        - type: "rsi_overbought"
          threshold: 70
          cooldown_hours: 6
    - symbol: "TSLA"
      alerts:
        - type: "rsi_overbought"
          threshold: 70
          cooldown_hours: 6
    - symbol: "AAPL"
      alerts:
        - type: "macd_cross_up"
          cooldown_hours: 6
    - symbol: "SPY"
      alerts:
        - type: "price_cross_ma200"
          cooldown_hours: 12
    - symbol: "QQQ"
      alerts:
        - type: "rsi_overbought"
          threshold: 70
          cooldown_hours: 6

  crypto:
    - symbol: "BTC-USD"
      alerts:
        - type: "rsi_oversold"
          threshold: 30
          cooldown_hours: 4
        - type: "rsi_overbought"
          threshold: 70
          cooldown_hours: 4
    - symbol: "ETH-USD"
      alerts:
        - type: "rsi_oversold"
          threshold: 30
          cooldown_hours: 4
    - symbol: "SOL-USD"
      alerts:
        - type: "macd_cross_up"
          cooldown_hours: 6

# ─────────────────────────────────────────────
# Agent Bot 配置（多 Bot 協調架構）
# ⚠️ Token 在 Railway 環境變數設定，不要寫在這裡
# ─────────────────────────────────────────────
agents:
  chief_strategist:
    enabled: true
    token_env: "CHIEF_STRATEGIST_TOKEN"
    watch_symbols: ["NVDA", "TSLA", "SPY"]
  trader:
    enabled: true
    token_env: "TRADER_TOKEN"
    watch_symbols: ["NVDA", "TSLA", "AAPL"]
  sector_analyst:
    enabled: true
    token_env: "SECTOR_ANALYST_TOKEN"
    watch_symbols: ["AAPL", "MSFT", "GOOGL"]
  macro_strategist:
    enabled: true
    token_env: "MACRO_STRATEGIST_TOKEN"
    watch_symbols: ["SPY", "QQQ", "GLD"]
  intelligence_officer:
    enabled: true
    token_env: "INTELLIGENCE_OFFICER_TOKEN"
    watch_symbols: ["BTC-USD", "ETH-USD"]
  risk_officer:
    enabled: true
    token_env: "RISK_OFFICER_TOKEN"
    watch_symbols: ["NVDA", "TSLA", "BTC-USD"]
  quant_strategist:
    enabled: true
    token_env: "QUANT_STRATEGIST_TOKEN"
    watch_symbols: ["SPY", "QQQ"]
