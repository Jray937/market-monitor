name: CI / Build Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          set -e
          python -m py_compile bot.py
          for f in src/*.py; do python -m py_compile "$f"; done
          echo Syntax OK

      - name: Import check
        run: |
          set -e
          python << 'PYEOF'
import sys
sys.path.insert(0, '.')
from src import config, data_fetcher, analyzer, alert_manager, logger
import src.discord_bot
print("All imports OK")
PYEOF

      - name: Config parse check
        run: |
          set -e
          python << 'PYEOF'
import os, sys
sys.path.insert(0, '.')
os.environ["DISCORD_BOT_TOKEN"] = "ci_dummy"
from src.config import load_config, parse_config
cfg = load_config()
result = parse_config(cfg)
print("parse_config:", len(result), "values OK")
PYEOF

      - name: Bot entry check
        run: python -c "import ast; ast.parse(open('bot.py').read()); print('bot.py OK')"
